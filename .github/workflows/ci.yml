name: Site CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel superseded runs only for pull requests. Pushes to main are grouped on
# the main ref with cancel-in-progress disabled, so an in-flight validation of a
# main commit is never cancelled by a later main commit.
concurrency:
  group: site-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  site-ci:
    name: site-ci
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository without persisting credentials
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Node.js
        # actions/setup-node v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Activate pinned pnpm through Corepack
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.34.5 --activate
          pnpm --version

      - name: Install dependencies from the frozen lockfile
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Run the full repository check suite
        shell: bash
        run: |
          set -euo pipefail
          pnpm run check
